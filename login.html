<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Cameras Decoded</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #000;
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-box {
      background: #0F0F0F;
      border: 1px solid #1A1A1A;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-box h1 {
      font-family: 'Space Mono', monospace;
      color: #8deb00;
      margin-bottom: 30px;
      font-size: 24px;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      color: #b4b4b4;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      background: #0A0A0A;
      border: 1px solid #2A2A2A;
      border-radius: 6px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
    }
    .input-group input:focus {
      outline: none;
      border-color: #8deb00;
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #8deb00;
      border: none;
      border-radius: 6px;
      color: #000;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }
    .btn-login:hover { opacity: 0.9; transform: scale(1.02); }
    .error-msg { color: #ff4d4d; margin-top: 15px; display: none; font-size: 14px; }
    .back-link { display: block; margin-top: 20px; color: #b4b4b4; font-size: 13px; text-decoration: none; }
    .back-link:hover { color: #8deb00; }
    /* --- PAGE FADE-IN TRANSITION --- */
    .main-content {
        animation: fadeIn 0.5s ease-in-out forwards;
    }

    @keyframes fadeIn {
        0% {
            opacity: 0;
            transform: translateY(10px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>LOGIN</h1>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>Email / Username</label>
        <input type="text" id="username" placeholder="partner or instructor" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="test123" required>
      </div>
      <button type="submit" class="btn-login">Access Dashboard</button>
      <div id="errorMsg" class="error-msg">Invalid credentials. Try: partner / test123</div>
    </form>
    <a href="index.html" class="back-link">← Return to Home</a>
  </div>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim().toLowerCase();
      const pass = document.getElementById('password').value.trim();
      const error = document.getElementById('errorMsg');

      if ((user === 'partner' || user === 'instructor') && pass === 'test123') {
        error.style.display = 'none';
        // Redirect to the correct dashboard based on username
        if (user === 'partner') window.location.href = 'partner-dashboard.html';
        else window.location.href = 'instructor-dashboard.html';
      } else {
        error.style.display = 'block';
      }
    }
  </script>
</body>
</html>
