<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
  // Wait for the HTML page to be completely loaded before running
  document.addEventListener('DOMContentLoaded', function() {
    
    const firebaseConfig = {
      apiKey: "AIzaSyB95Vx0i8W6WNfUy1N4TNQyfN5xCxQYnz8",
      authDomain: "cameras-decoded.firebaseapp.com",
      projectId: "cameras-decoded",
      storageBucket: "cameras-decoded.firebasestorage.app",
      messagingSenderId: "1088920052790",
      appId: "1:1088920052790:web:2177c1fb31109c1fa02497",
      measurementId: "G-YN3M01WW0B"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Attach the event listener now that we are 100% sure the form exists
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const error = document.getElementById('errorMsg');

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          error.style.display = 'none';
          
          // --- UPDATED REDIRECT LOGIC ---
          const userRole = localStorage.getItem('userRole') || 'Partner'; 
          if(userRole === 'Instructor') {
            window.location.href = 'instructor-dashboard.html';
          } else if(userRole === 'Operator') {
            window.location.href = 'operator-dashboard.html';
          } else {
            window.location.href = 'partner-dashboard.html';
          }
          // --------------------------------
        })
        .catch((err) => {
          error.style.display = 'block';
          error.innerText = err.message;
        });
    });

  });
</script>
