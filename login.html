<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB95Vx0i8W6WNfUy1N4TNQyfN5xCxQYnz8",
    authDomain: "cameras-decoded.firebaseapp.com",
    projectId: "cameras-decoded",
    storageBucket: "cameras-decoded.firebasestorage.app",
    messagingSenderId: "1088920052790",
    appId: "1:1088920052790:web:2177c1fb31109c1fa02497",
    measurementId: "G-YN3M01WW0B"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const error = document.getElementById('errorMsg');

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        error.style.display = 'none';
        
        // --- UPDATED REDIRECT LOGIC ---
        const userRole = localStorage.getItem('userRole') || 'Partner'; // Fallback to Partner
        if(userRole === 'Instructor') {
          window.location.href = 'instructor-dashboard.html';
        } else if(userRole === 'Operator') {
          window.location.href = 'operator-dashboard.html'; // New page
        } else {
          window.location.href = 'partner-dashboard.html';
        }
        // --------------------------------
      })
      .catch((err) => {
        error.style.display = 'block';
        error.innerText = err.message;
      });
  });
</script>
