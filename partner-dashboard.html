<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Dashboard — Cameras Decoded</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #000;
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      padding: 40px 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1A1A1A;
      padding-bottom: 20px;
      margin-bottom: 40px;
    }
    .header h1 {
      font-family: 'Space Mono', monospace;
      color: #8deb00;
      font-size: 24px;
    }
    .logout-btn {
      padding: 8px 20px;
      background: transparent;
      border: 1px solid #8deb00;
      border-radius: 6px;
      color: #8deb00;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      transition: 0.2s;
    }
    .logout-btn:hover {
      background: rgba(141, 235, 0, 0.1);
      box-shadow: 0 0 15px rgba(141, 235, 0, 0.3);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: #0F0F0F;
      border: 1px solid #1A1A1A;
      border-radius: 10px;
      padding: 25px;
    }
    .card h3 { color: #8deb00; font-size: 14px; margin-bottom: 6px; }
    .card .value { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .card .sub { color: #b4b4b4; font-size: 13px; }
    .bar-bg { height: 4px; background: #1A1A1A; border-radius: 2px; margin-top: 12px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #1db31b 0%, #c9e265 100%); }
    /* --- PAGE FADE-IN TRANSITION --- */
    .main-content {
        animation: fadeIn 0.5s ease-in-out forwards;
    }

    @keyframes fadeIn {
        0% {
            opacity: 0;
            transform: translateY(10px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>PARTNER DASHBOARD</h1>
    <button class="logout-btn" onclick="window.location.href='login.html'">Logout</button>
  </div>
  <p style="color:#b4b4b4; margin-bottom:20px;">Real-time metrics for your Signal Network licensing.</p>
  <div class="grid">
    <div class="card"><h3>Total Clicks (Last 30d)</h3><div class="value">1,284</div><div class="sub">+12% from last month</div><div class="bar-bg"><div class="bar-fill" style="width:75%;"></div></div></div>
    <div class="card"><h3>Partner Revenue</h3><div class="value">$4,200</div><div class="sub">30% commission earned</div><div class="bar-bg"><div class="bar-fill" style="width:80%;"></div></div></div>
    <div class="card"><h3>Active Licenses</h3><div class="value">14</div><div class="sub">2 expiring this quarter</div><div class="bar-bg"><div class="bar-fill" style="width:60%;"></div></div></div>
    <div class="card"><h3>Return Rate (Avg)</h3><div class="value">22%</div><div class="sub">⬇ 8% reduction (good!)</div><div class="bar-bg"><div class="bar-fill" style="width:40%;"></div></div></div>
  </div>
</body>
</html>
