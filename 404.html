<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Signal Lost | Cameras Decoded</title>
  <meta name="description" content="The transmission you are looking for does not exist. Return to base.">
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #000000;
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    /* Ambient Green Glow */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 600px;
      background: linear-gradient(180deg, rgba(29, 179, 27, 0.30) 0%, transparent 100%);
      pointer-events: none;
      z-index: -1;
    }

    h1, h2, .mono { font-family: 'Space Mono', monospace; }
    .green-text { color: #8deb00; }
    .grey-text { color: #b4b4b4; }
    a { text-decoration: none; color: inherit; transition: 0.2s; }

    .container {
      max-width: 600px;
      padding: 20px;
      animation: fadeIn 0.5s ease-in-out forwards;
    }

    /* Big Glitchy 404 */
    .error-code {
      font-family: 'Space Mono', monospace;
      font-size: 120px;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(180deg, #8deb00 0%, #1db31b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 28px;
      color: #ffffff;
      letter-spacing: 4px;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      color: #b4b4b4;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* Neon Return Button */
    .btn-return {
      display: inline-block;
      padding: 14px 40px;
      background: transparent;
      border: 1px solid #8deb00;
      border-radius: 8px;
      color: #8deb00;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
    }
    .btn-return:hover {
      background: rgba(141, 235, 0, 0.1);
      box-shadow: 0 0 25px rgba(141, 235, 0, 0.4);
      transform: scale(1.05);
    }

    /* Fade-in reused from your site */
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .error-code { font-size: 80px; }
      h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h2>SIGNAL LOST.</h2>
    <p>The transmission you are looking for doesn't exist. <br>Return to base and realign your coordinates.</p>
    <a href="index.html" class="btn-return">Return to Home →</a>
  </div>
</body>
</html>
