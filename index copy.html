<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cameras Decoded — The Operator Confidence Company</title>
  <meta name="description" content="We turn mirrorless owners into confident operators. Access the Camera Confidence Guide, the Decoder Atlas, and the Inner Signal psychology system.">
    
  <!-- Open Graph / Social Media Sharing Meta Tags -->
  <meta property="og:title" content="Cameras Decoded — The Operator Confidence Company">
  <meta property="og:description" content="We turn mirrorless owners into confident operators. Access the Camera Confidence Guide, the Decoder Atlas, and the Inner Signal psychology system.">
  <meta property="og:url" content="https://camerasdecoded.com">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://camerasdecoded.com/cameras-decoded-logo.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #000000;
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.6;
      position: relative;
      display: flex;
      min-height: 100vh;
    }

    /* ---------- BOOSTED GREEN GLOW ---------- */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 600px;
      background: linear-gradient(180deg, rgba(29, 179, 27, 0.30) 0%, transparent 100%);
      pointer-events: none;
      z-index: -1;
    }

    /* ----- FLOATING SCROLL TO TOP BUTTON ----- */
    #scrollTopBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 1px solid #8deb00;
      background: rgba(0, 0, 0, 0.85);
      color: #8deb00;
      cursor: pointer;
      font-size: 18px;
      z-index: 999;
      font-family: 'Space Mono', monospace;
      transition: 0.3s ease;
      box-shadow: 0 0 10px rgba(141, 235, 0, 0.2);
    }
    #scrollTopBtn:hover {
      background: #8deb00;
      color: #000000;
      box-shadow: 0 0 20px rgba(141, 235, 0, 0.6);
      transform: translateY(-2px);
    }

    /* ----- ATMOSPHERIC DASHBOARD GLOW ----- */
    .db-card .db-value {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 2px;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(141, 235, 0, 0.6);
    }

    /* ----- ATLAS OVERLAY BUTTON ----- */
    .atlas-overlay-btn {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 40px;
        background: #8deb00;
        color: #000000;
        font-family: 'Space Mono', monospace;
        font-weight: 700;
        font-size: 18px;
        border-radius: 8px;
        text-decoration: none;
        box-shadow: 0 4px 20px rgba(141, 235, 0, 0.4);
        border: none;
        z-index: 10;
        transition: 0.25s ease;
        letter-spacing: 0.3px;
    }

    .atlas-overlay-btn:hover {
        transform: translateX(-50%) scale(1.04);
        background: #a0f520;
        box-shadow: 0 8px 40px rgba(141, 235, 0, 0.7);
    }

    /* ----- FIX FOR THE BLANK VIDEO SECTION ----- */
    .hero-spread video {
        width: 100%;
        height: auto;
        display: block;
        background: #0F0F0F;
        min-height: 120px;
    }

    h1, h2, h3, .mono { font-family: 'Space Mono', monospace; }
    .green-text { color: #8deb00; }
    .grey-text { color: #b4b4b4; }
    a { text-decoration: none; color: inherit; transition: 0.2s; }

    /* --- DESKTOP SIDEBAR --- */
    .sidebar {
      width: 240px;
      background: rgba(0,0,0,0.9);
      padding: 25px 25px;
      border-right: 1px solid #1A1A1A;
      height: 100vh;
      position: sticky;
      top: 0;
      flex-shrink: 0;
    }
    .sidebar .logo {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      line-height: 1.1;
      margin-bottom: 10px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #1db31b 0%, #c9e265 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }
    .sidebar .nav-item {
      display: block;
      padding: 12px 0;
      color: #b4b4b4;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.5px;
      border-bottom: 1px solid transparent;
      transition: all 0.2s;
    }
    .sidebar .nav-item:hover {
      color: #8deb00;
      transform: translateX(6px) scale(1.05);
      text-shadow: 0 0 12px rgba(141, 235, 0, 0.6);
      border-bottom: 1px solid #8deb00;
      transition: 0.15s ease-in-out;
    }

    .main-content {
      flex: 1;
      padding: 20px 40px 40px 40px;
      max-width: 1200px;
    }

    .top-nav {
      display: flex;
      justify-content: flex-end;
      gap: 30px;
      margin-bottom: 30px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: #b4b4b4;
    }
    .top-nav a { color: #8deb00; }

    /* --- HERO (GLOBE IMAGE) --- */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 20px;
    }
    .hero-globe-container {
      width: 100%;
      max-width: 450px;
      aspect-ratio: 1 / 1;
      margin: 0 auto 20px auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, #e0b12d 0%, #1db31b 40%, #8deb00 100%);
      box-shadow: 0 0 40px rgba(29, 179, 27, 0.2), inset 0 0 20px rgba(0,0,0,0.8);
      background-color: #000;
      overflow: hidden;
    }
    .globe-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }
    .globe-fallback-text {
      position: absolute;
      text-align: center;
      color: #8deb00;
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      line-height: 1.2;
      pointer-events: none;
    }
    .play-btn {
      position: absolute;
      bottom: 15px;
      right: 15px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #8deb00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8deb00;
      font-size: 14px;
      cursor: pointer;
      z-index: 2;
    }
    .hero h1 { font-size: 32px; margin: 8px 0; }
    .hero .subtitle { font-size: 15px; color: #b4b4b4; }

    .hero-pills {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0 30px 0;
      flex-wrap: wrap;
    }
    .btn-pill-outline {
      padding: 10px 28px;
      background: transparent;
      border: 1px solid #8deb00;
      border-radius: 8px;
      color: #8deb00;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      transition: 0.2s;
    }
    .top-nav a:hover, .btn-pill-outline:hover {
      background: rgba(141, 235, 0, 0.15);
      box-shadow: 0 0 25px rgba(141, 235, 0, 0.4);
      transform: scale(1.05);
      transition: 0.15s ease-in-out;
    }

    .hero-spread {
      width: 100%;
      margin-bottom: 30px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #1A1A1A;
      background: #0F0F0F;
      display: flex;
    }

    /* --- TICKER --- */
    .ticker {
      background: #0F0F0F;
      border: 1px solid #1A1A1A;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .ticker .left { font-family: 'Space Mono', monospace; font-size: 13px; color: #8deb00; }
    .ticker .left span { color: #b4b4b4; }
    .ticker .right { font-size: 12px; color: #b4b4b4; }

    .section-header {
      margin-bottom: 20px;
      margin-top: 50px;
      border-bottom: 1px solid #1A1A1A;
      padding-bottom: 15px;
    }
    .section-header h2 {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      color: #8deb00;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .join-signal {
      text-align: center;
      border: 1px solid #1A1A1A;
      border-radius: 8px;
      padding: 30px 20px;
      margin-bottom: 30px;
    }
    .join-signal h3 { font-size: 20px; margin-bottom: 6px; }
    .join-signal p { color: #b4b4b4; font-size: 14px; margin-bottom: 20px; }
    .btn-orange {
      background: linear-gradient(90deg, #ff7e5f 0%, #feb47b 100%);
      border: none;
      border-radius: 25px;
      padding: 12px 30px;
    }
  </style>
</head>
<body>

  <!-- Your existing Sidebar and Main Layout content blocks sit here -->

  <!-- INTERACTIVE SCROLL TO TOP UI ELEMENT -->
  <button id="scrollTopBtn" onclick="window.scrollTo({top:0, behavior:'smooth'});">↑</button>

  <!-- WINDOW TRACKER SCRIPT -->
  <script>
    window.onscroll = function() {
      const btn = document.getElementById('scrollTopBtn');
      if (btn) {
        if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
          btn.style.display = 'block';
        } else {
          btn.style.display = 'none';
        }
      }
    };
  </script>

</body>
</html>
